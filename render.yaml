# Render Blueprint — one-click deploy of the API + a free PostgreSQL instance.
# Push this repo to GitHub, then in Render: New > Blueprint > select the repo.
services:
  - type: web
    name: rapidrubric-ta-review-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rapidrubric-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_TTL
        value: 2h
      - key: FRONTEND_URL
        value: "*"

databases:
  - name: rapidrubric-db
    plan: free
